<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Clothing Store</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f4f4;
      text-align: center;
    }

    header {
      background: black;
      color: white;
      padding: 20px;
      font-size: 24px;
    }

    .product {
      background: white;
      margin: 20px;
      padding: 15px;
      display: inline-block;
      width: 200px;
      border-radius: 10px;
    }

    button {
      background: black;
      color: white;
      border: none;
      padding: 10px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: gray;
    }
  </style>
</head>

<body>

<header>
  🛍 My Clothing Store
</header>

<h2>Our Products</h2>

<div class="product">
  <h3>T-Shirt</h3>
  <p>Price: 10€</p>
  <button>Buy</button>
</div>

<div class="product">
  <h3>Hoodie</h3>
  <p>Price: 25€</p>
  <button>Buy</button>
</div>

<div class="product">
  <h3>Cap</h3>
  <p>Price: 8€</p>
  <button>Buy</button>
</div>

</body>
</html>
